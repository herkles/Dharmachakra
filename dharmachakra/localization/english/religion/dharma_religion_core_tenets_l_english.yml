####### NEW NAMES AND DESCRIPTIONS FOR OLD TENETS #######
  tenet_consolamentum_jain_name: "Sallekhana"
  tenet_adaptive_jain_name: "Anekantavada"
  tenet_faqr_name: "Faqr"
  tenet_yoga_name: "Yoga"
  tenet_tantra_name: "Tantra"

  tenet_asteya_name: "Asteya"
  tenet_asteya_desc: "Prompting a person to steal, or prompting him through another or approving of the theft, is the first transgression. The second is receiving stolen goods from a person, whose action has neither been prompted nor approved by the recipient. Receiving or buying goods otherwise than by lawful and just means is an irregularity or a transgression. An attempt to buy precious things very cheaply in a disordered state is the third transgression. Cheating others by the use of false weights and measures in order to obtain more from others and give less to others, is the fourth transgression. Deceiving others with artificial gold, synthetic diamonds and so on, is the fifth transgression. These five are the transgressions of the vow of non-stealing."

  tenet_ahimsa_name: "Ahimsa"
  tenet_ahimsa_desc: "Ahimsa is the highest Dharma, Ahimsa is the highest self-control, Ahimsa is the greatest gift, Ahimsa is the best practice, Ahimsa is the highest sacrifice, Ahimsa is the finest strength, Ahimsa is the greatest friend, Ahimsa is the greatest happiness, Ahimsa is the highest truth, and Ahimsa is the greatest teaching."

  tenet_atithi_devo_bhava_name: "Athithi Devo Bhava"
  tenet_atithi_devo_bhava_desc: "Be one for whom the Mother is God, be one for whom the Friend is God, be one for whom the Father is God, be one for whom the Child is God, be one for whom the Teacher is God, and be one for whom the Guest is God."

























