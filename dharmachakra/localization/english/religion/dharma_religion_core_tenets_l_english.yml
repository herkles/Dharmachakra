####### NEW TENETS #######
  tenet_dhammavicaya_name: "Dhamma Vicaya"
  tenet_dhammavicaya_desc: "This concept implies applying discernment to body-mind phenomena in order to apply right effort, giving way to entry into the first jhana. Through analysis, debate, and meditation we can better understand the path to enlightenment."

  tenet_iranian_syncretism_name: "Iranian Syncretism"
  tenet_iranian_syncretism_desc: "There is something to be said of the wisdom of the various Iranian prophets like Zoraster and Mani. Their wisdom and teachings are wise and just and maybe it would be good to heed some of their teachings.."
  doctrine_parameter_hostility_override_iranian_hostility_doctrine: "Iranian [faiths|E] are considered only [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
  #Instead, add these doctrine parameters to appropriate tenets (presently Iranian Syncretism).

  doctrine_parameter_is_iranian_faith_bilateral_loc_override: "Considers Iranian [faiths|E], and is considered by Iranian $game_concept_faiths$, to be [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] instead of $hostility_evil_tooltippable$"
  doctrine_parameter_hostility_override_special_doctrine_is_iranian_faith: "Considers iranian [faiths|E], and is considered by Iranian $game_concept_faiths$, to be [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] instead of $hostility_evil_tooltippable$"

  doctrine_parameter_iranian_syncretic_actor_opinion_active: "Mutual [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] [opinion|E] bonus with Iranian [faiths|E]"
  doctrine_parameter_iranian_syncretic_recipient_opinion_active: "Mutual [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] [opinion|E] bonus with [faiths|E] that have the $tenet_iranian_syncretism_name$ [core_tenet|E]"
