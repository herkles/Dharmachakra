  nias_animism_old_desc: "Fanömba Adu is the native religious practice of people of Nias. It literally translates to the worship of "Adu", wooden effigies representing their ancestral spirits. They believe that on death, a person's "breath" (noso) will return to their ancestral land, the realm of spirits, Teteholi Ana'a, while their "shadow" will be left in this world as "Bekhu" or spirits. Headhunting plays important role in their society, the sacrificial head is used in many ceremonies and required before a new building can be constructed. A boy can only be considered a man after he hunted his first head."

