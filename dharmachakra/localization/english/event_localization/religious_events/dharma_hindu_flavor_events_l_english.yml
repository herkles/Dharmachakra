  dharma_hinduism.307.t: "Mystical Learning"
  dharma_hinduism.307.desc: "While you are at Sharada Peeth, you encounter a Monk that is willing to help teach you about some more esoteric and mystical Buddhist traditions. However, should you take the offer or should you return to a more general study of the Buddhist texts?"
