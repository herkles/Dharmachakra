  dharma_hinduism.311.sanskrit.success_title: "Successfully learned Sanskrit"
  dharma_hinduism.311.sanskrit.failure: "You fail to grasp and understand Sanskrit."
  dharma_hinduism.311.sanskrit.failure_title: "Failed to learn Sanskrit."
  dharma_hinduism.311.study: "I shall study other texts"

  dharma_hinduism.312.t: "Learning to love to read"
  dharma_hinduism.312.desc: "Spending all your time reading and studying at Sharada Peeth, you find yourself enjoying reading more and more. Do you prefer to read in your library or do you prefer to write your thoughts on the books down? "
  dharma_hinduism.312.read: "I like to read in my quiet Library"
  dharma_hinduism.312.write: "I like to write my thoughts down"

  dharma_hinduism.313.t: "Religious Conversion"
  dharma_hinduism.313.desc: "While you are at Sharda Peeth, you have found yourself growing closer and closer to the teachings of Trika Shaivism. Shall you follow and accept the teachings of Trika Shaivism, or will you stick to your current faith."
  dharma_hinduism.313.convert: "om namah Shiva, om namah Shakti"
  dharma_hinduism.313.no_convert: "I shall stick with my faith."

  dharma_hinduism.314.t: "Philosophical Instruction"
  dharma_hinduism.314.desc: "While you are at Sharda Peeth, you have the opportunity to do some philosophical study under some of the monks and learn some finer points of Hindu philosophy. The question is which philosophical school shall you study?"
  dharma_hinduism.314.yoga: "Yoga."
  dharma_hinduism.314.samkhya: "Samkhya."
  dharma_hinduism.314.vaisheshika: "Vaisheshika."
  dharma_hinduism.314.mimamsa: "Mimamsa."
  dharma_hinduism.314.nyaya: "Nyaya."
  dharma_hinduism.314.study: "I will stick to other studies"

  dharma_hinduism.315.t: "Taking a class"
  dharma_hinduism.315.desc: "While you are at the University you have the opportunity to be in one of the classes for the monks. The question is though what sort of class would you like to observe? "
  dharma_hinduism.315.yoga: "I shall observe a class on Yoga"
  dharma_hinduism.315.book: "I shall observe a class on the Vedas"
  dharma_hinduism.315.logic: "I shall observe a class on Logic"
  dharma_hinduism.315.astrology: "I shall observe a class on Astrology"

  dharma_hinduism.316.t: "Returning Home"
  dharma_hinduism.316.desc: "After some time at Sharada Peeth University, you have returned to [Root.GetCapital]. Visiting the University was quite the experience and you are glad that you went."
  dharma_hinduism.316.home: "It is good to be home."

and studied under the famed monk, Naropa. "
  dharma_buddhism.055.atisa: "Welcome to Tibet."

  dharma_buddhism.056.t: "Atisa founds the Kadam School of Buddhism"
  dharma_buddhism.056.desc: "Atisa has announced that he has created a new school of Tibetan Buddhism called the Kadam School. This school focuses on compassion, pure discipline and study. A number of Tibetan Monastics have begun to study under him and his disciples."
  dharma_buddhism.056.kadam: "Quite the interesting development"
  dharma_buddhism.056.kadam_adopt: "Patronize the New School"

  dharma_buddhism.057.t: "Drogmi returns from India"
  dharma_buddhism.057.desc: "The monk Drogmi has returned from his stay in India. He claims to have received quite the education while studying under the great Mahasiddha Naropa."
  dharma_buddhism.057.drogmi: "Welcome Home."

  dharma_buddhism.058.t: "Prince in Sa'gya becomes a student of Drogmi"
  dharma_buddhism.058.desc: "A local prince in Sa'gya has decided to follow Drogmi and embraced the life of a monastic, discarding [hisher] world possessions in order to study under him."
  dharma_buddhism.058.prince: "An interesting development."

  dharma_buddhism.059.t: "Drogmi founds the Sakya School of Buddhism"
  dharma_buddhism.059.desc: "Drogmi has announced that he has created a new school of Tibetan Buddhism called the Sakya School. A number of Tibetan Monastics have begun to study under him and his disciples."
  dharma_buddhism.059.sakya: "Quite the interesting development"
  dharma_buddhism.059.sakya_adopt: "Patronize the New School"

  dharma_buddhism.060.t: "Marpa sets up his seat in a Tibetan Monastery"
  dharma_buddhism.060.desc: "The monastic Marpa has set up in a local Monastery where he has begun to teach. Marpa is a skilled monk, and he has trained under the famous Mahasiddha Naropa. "
  dharma_buddhism.060.marpa: "Quite the monk"

  dharma_buddhism.061.t: " Marpa's Four Great Pillars"
  dharma_buddhism.061.desc: "A number of students have begun to follow Marpa. Four of these students, Milarepa,Tshurton Wangi, Ngok Choku, and Meton Tsonpo stand out among the rest. Collectively they are being referred to as the Four Great Pillars."
  dharma_buddhism.061.students: "A good master is reflected by his students."

  dharma_buddhism.062.t: "Following a Buddhist School"
  dharma_buddhism.062.desc: "Drogmi has announced that he has created a new school of Tibetan Buddhism called the Sakya School. A number of Tibetan Monastics have begun to study under him and his disciples."
  dharma_buddhism.062.kagyu: "Quite the interesting development"
  dharma_buddhism.062.kagyu_adopt: "Patronize the New School"

