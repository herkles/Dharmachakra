  dharma_buddhism.306.observe: "Stay out of the debate"

  dharma_buddhism.307.t: "Mystical Learning"
  dharma_buddhism.307.desc: "While you are at Nalanda, you encounter a Monk that is willing to help teach you about some more esoteric and mystical Buddhist traditions. However, should you take the offer or should you return to a more general study of the Buddhist texts?"
  dharma_buddhism.307.mystic: "I shall study under the mystic"
  dharma_buddhism.307.mystic.success: "You are able to grasp the mystical and esoteric teachings that the Mystic was talking about."
  dharma_buddhism.307.mystic.success_title: "Successfully grasped the Monk's teachings"
  dharma_buddhism.307.mystic.failure: "You fail to grasp the mystical and esoteric teachings that the Mystic was talking about."
  dharma_buddhism.307.mystic.failure_title: "Failed to grasp the Monk's teachings."
  dharma_buddhism.307.study: "I shall study other texts"

  dharma_buddhism.308.t: "Learning Ancient Languages"
  dharma_buddhism.308.desc: "While you are staying at Nalanda, one of the monks has offered to teach you one of the ancient languages. You could choose to learn Sanskrit or you could choose to learn Pali. Alternatively you could choose to focus on other studies while at the university. What shall you do?"
  dharma_buddhism.308.pali: "I shall study Pali"
  dharma_buddhism.308.pali.success: "You are able to grasp and understand Pali"
  dharma_buddhism.308.pali.success_title: "Successfully learned Pali"
  dharma_buddhism.308.pali.failure: "You fail to grasp and understand Pali."
  dharma_buddhism.308.pali.failure_title: "Failed to learn Pali."
  dharma_buddhism.308.sanskrit: "I shall study Sanskrit"
  dharma_buddhism.308.sanskrit.success: "You are able to grasp and understand Sanskrit"
  dharma_buddhism.308.sanskrit.success_title: "Successfully learned Sanskrit"
  dharma_buddhism.308.sanskrit.failure: "You fail to grasp and understand Sanskrit."
  dharma_buddhism.308.sanskrit.failure_title: "Failed to learn Sanskrit."
  dharma_buddhism.308.study: "I shall study other texts"

  dharma_buddhism.309.t: "Studying Languages"
  dharma_buddhism.309.desc: "Spending your time in the cosmopolitan environment of Nalanda, you are presented with the opportunity to study foreign languages. Shall you do so, or shall you focus on other studies?"
  dharma_buddhism.309.language: "Let me try to study languages"
  dharma_buddhism.309.language.success: "Your understanding of languages improves."
  dharma_buddhism.309.language.success_title: "Your knowledge of languages improves."
  dharma_buddhism.309.language.failure: "You fail to improve your knowledge of languages."
  dharma_buddhism.309.language.failure_title: "Failed to improve language knowledge."
  dharma_buddhism.309.study: "I will focus on other studies"

  dharma_buddhism.310.t: "Medical learning"
  dharma_buddhism.310.desc: "While you are at Nalanda, you encounter a Monk that is willing to teach you about Medicine and medical practices. Should you take up his offer to learn more about medicine or should you return to a more general study of the Buddhist Texts?"
  dharma_buddhism.310.medical: "Study under the Monk"
  dharma_buddhism.310.medical.success: "You are able to grasp the medical teachings that the Mystic was talking about.."
  dharma_buddhism.310.medical.success_title: "Successfully grasped the Monk's teachings"
  dharma_buddhism.310.medical.failure: "You fail to grasp the medical teachings that the Mystic was talking about.."
  dharma_buddhism.310.medical.failure_title: "Failed to grasp the Monk's teachings."
  dharma_buddhism.310.study: "I shall study other texts"

  dharma_buddhism.311.t: "Taking home a book"
  dharma_buddhism.311.desc: "While you are at Nalanda, one of the senior monks offers to give you a copy of one of the books in the library for your own personal collection. Which book shall you accept, or shall you decline this gift?"
  dharma_buddhism.311.sutta: "Thank you for the copy of the Sutta Pitaka"
  dharma_buddhism.311.heart_sutra: "Thank you for the copy of the Heart Sutra"
  dharma_buddhism.311.dhammapada: "Thank you for the copy of the Dhammapada"
  dharma_buddhism.311.lankavatara: "Thank you for the copy of the Lankavatara Sutra"
  dharma_buddhism.311.no_gift: "I can not accept such a gift"

  dharma_buddhism.312.t: "Learning to love to read"
  dharma_buddhism.312.desc: "Spending all your time reading and studying at Nalanda, you find yourself enjoying reading more and more. Do you prefer to read in your library or do you prefer to write your thoughts on the books down? "
  dharma_buddhism.312.read: "I like to read in my quiet Library"
  dharma_buddhism.312.write: "I like to write my thoughts down"

  dharma_buddhism.313.t: "Philosophical Instruction"
  dharma_buddhism.313.desc: "While you are at Nalanda, you have the opportunity to do some philosophical study under some of the monks and learn some finer points of Buddhist philosophy. The question is which philosophical school shall you study under?"
  dharma_buddhism.313.chan: "I shall Study the Chan School"
  dharma_buddhism.313.madhyamaka: "I shall Study the Madhyamaka School"
  dharma_buddhism.313.yogachara: "I shall Study the Yogachara School"
  dharma_buddhism.313.pure_land: "I shall Study the Pure Land School"
  dharma_buddhism.313.study: "I will stick to other studies"

