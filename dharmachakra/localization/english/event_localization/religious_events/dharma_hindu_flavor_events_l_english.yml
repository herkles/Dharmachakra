  dharma_hinduism.309.t: "Taking home a book"
  dharma_hinduism.309.desc: "While you are at Nalanda, one of the senior monks offers to give you a copy of one of the books in the library for your own personal collection. Which book shall you accept, or shall you decline this gift?"
  dharma_hinduism.309.bhagavad_gita: "Thank you for the copy of the Bhagavad-Gita"
  dharma_hinduism.309.vedas: "Thank you for the copy of One of the Vedas"
  dharma_hinduism.309.shiva_purana: "Thank you for the copy of the Shiva Purana"
  dharma_hinduism.309.shakti_purana: "Thank you for the copy of the Shakti Purana"
  dharma_hinduism.309.no_gift: "I can not accept such a gift"

  dharma_hinduism.310.t: "Medical learning"
  dharma_hinduism.310.desc: "While you are at Sharada Peeth, you encounter a Monk that is willing to teach you about Medicine and medical practices. Should you take up his offer to learn more about medicine or should you return to a more general study of the Buddhist Texts?"
  dharma_hinduism.310.medical: "Study under the Monk"
  dharma_hinduism.310.medical.success: "You are able to grasp the medical teachings that the Mystic was talking about.."
  dharma_hinduism.310.medical.success_title: "Successfully grasped the Monk's teachings"
  dharma_hinduism.310.medical.failure: "You fail to grasp the medical teachings that the Mystic was talking about.."
  dharma_hinduism.310.medical.failure_title: "Failed to grasp the Monk's teachings."
  dharma_hinduism.310.study: "I shall study other texts"

  dharma_hinduism.311.t: "Learning Ancient Languages"
  dharma_hinduism.311.desc: "While you are staying at Sharada Peeth, one of the monks has offered to teach you one of the ancient languages. You could choose to learn Sanskrit or you could choose to learn Pali. Alternatively you could choose to focus on other studies while at the university. What shall you do?"
  dharma_hinduism.311.pali: "I shall study Pali"
  dharma_hinduism.311.pali.success: "You are able to grasp and understand Pali"
  dharma_hinduism.311.pali.success_title: "Successfully learned Pali"
  dharma_hinduism.311.pali.failure: "You fail to grasp and understand Pali."
  dharma_hinduism.311.pali.failure_title: "Failed to learn Pali."
  dharma_hinduism.311.sanskrit: "I shall study Sanskrit"
