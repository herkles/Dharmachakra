  dharma_buddhism.315.t: "Taking a class"
  dharma_buddhism.315.desc: "While you are at the University you have the opportunity to be in one of the classes for the monks. The question is though what sort of class would you like to observe? "
  dharma_buddhism.315.yoga: "I shall observe a class on Yoga"
  dharma_buddhism.315.book: "I shall observe a class on the Tripitaka"
  dharma_buddhism.315.logic: "I shall observe a class on Logic"
  dharma_buddhism.315.astrology: "I shall observe a class on Astrology"

  dharma_buddhism.316.t: "Returning Home"
  dharma_buddhism.316.desc: "After some time at Nalanda University, you have returned to [Root.GetCapital]. Visiting the University was quite the experience and you are glad that you went."
  dharma_buddhism.316.home: "It is good to be home."





