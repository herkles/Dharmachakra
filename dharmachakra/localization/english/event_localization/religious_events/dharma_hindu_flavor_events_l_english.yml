  dharma_hinduism.500.vaishnavism_krishna: "Krishna, the Lord of Compassion"
  dharma_hinduism.500.vaishnavism_rama: "Rama, the exiled Prince."
  dharma_hinduism.500.vaishnavism_varaha: "Varaha, the Lord of Sacrifices."
  dharma_hinduism.500.vaishnavism_narasimha: "Narasimha, the man-lion lord of protection."
  dharma_hinduism.500.vaishnavism_hayagriva: "Haygriva, god of knowledge and wisdom"
  dharma_hinduism.500.vaishnavism_jagganath: "Jagganath, Lord of the Universe."
  # Shaivism Gods
  dharma_hinduism.500.shaivism_parvati: "Parvati,Wife of Shiva and the goddess of fertility and beauty."
  dharma_hinduism.500.shaivism_virabhadra: "Vīrabhadra, god of righteous anger."
  dharma_hinduism.500.shaivism_munishwarar: "Munīshwarar, god of the home and family."
  dharma_hinduism.500.shaivism_dakshinamoorthy: "Dakshinamoorthy, god of all forms of learning."
  dharma_hinduism.500.shaivism_kali: "Kali, goddess of the destruction of evil."
  # Shaktism Gods
  dharma_hinduism.500.shaktism_durga: "Durga, the fierce Mother Goddess who slays evil."
  dharma_hinduism.500.shaktism_kali: "Kali, goddess of the destruction of evil."
  dharma_hinduism.500.shaktism_parvati: "Parvati, goddess of fertility and beauty."
  dharma_hinduism.500.shaktism_lakishimi: "Lakshmi, goddess of fortune and prosperity."
  dharma_hinduism.500.shaktism_saraswati: "Saraswati, goddess of learning and art."
  # Smartism Gods
  dharma_hinduism.500.smartism_ganesha: "Ganesha, god of wisdom and new beginnings."
  dharma_hinduism.500.smartism_vishnu: "Vishnu, the god who watches over creation."
  dharma_hinduism.500.smartism_shiva: "Shiva, the god who hunts down evil."
  dharma_hinduism.500.smartism_shakti: "Shakti, The Great Mother Goddess."
  dharma_hinduism.500.smartism_surya: "Surya, The Lord of the Sun."
  # Vaishnavism Gods
  dharma_hinduism.500.ganapti_bala: "Bala Ganaptai, The Child Ganesha that brings joy and health."
  dharma_hinduism.500.ganapti_haridra: "Haridra Ganapati, Ganesha who brings wealth and prosperity."
  dharma_hinduism.500.ganapti_heramba: "Heramba Ganapati, Protector of the Weak, giver of courage."
  dharma_hinduism.500.ganapti_maha: "Uchchhishta Ganapati, protector of the country and giver of boons"
  # Vaishnavism Gods
  dharma_hinduism.500.kaumaram_murugan: "Murugan, God of War and Victory, and Commander of the Gods"
  dharma_hinduism.500.kaumaram_shiva: "Shiva, Father of Murugan and the god who hunts down evil."
  dharma_hinduism.500.kaumaram_valli: "Valli, A wife of Murugan and the Goddess of aspiration and will."
  dharma_hinduism.500.kaumaram_parvati: "Parvati, Mother of Murugan and the goddess of fertility and beauty."
  # Vaishnavism Gods
  dharma_hinduism.500.saura_surya: "Surya, Lord of the Sun."
  dharma_hinduism.500.saura_mitra: "Mitra, God of Friendships, oaths, and the morning Sun."
  dharma_hinduism.500.saura_sanjna: "Sanjna,  Goddess of Clouds and Dusk"
  dharma_hinduism.500.saura_ushas: "Ushas, Goddess of Dawn who drives away oppressive darkness."
  # Vaishnavism Gods
  dharma_hinduism.500.vedic_indra: "Indra, the King of the Devas."
  dharma_hinduism.500.vedic_surya: "Surya, Lord of the Sun."
  dharma_hinduism.500.vedic_agni: "Agni, The God of Fire."
  dharma_hinduism.500.vedic_brihaspati: "Brihaspati, Chief Guru of the Devas."
  # Other Gods
  dharma_hinduism.500.other: "Other Deities"
  dharma_hinduism.500.optout: "I am not yet ready to decide."
  dharma_hinduism.500.flavor: "There is no shame in waiting until I am certain."

  # Other Bhakti
  dharma_hinduism.501.t: "Bhakti"
  dharma_hinduism.501.desc: "Bhakti can be likened to feelings of fondness, devotion, and worship, but none of these fully encompass the concept. By devoting myself to an avatar of divinity, I am committing myself to them in body and soul.\n\n[ROOT.Char.GetFaith.GetNameNoTooltip] focuses on the veneration of just several of them. Of these aspects, one must speak to me more than the others..."
  # Other Gods
  dharma_hinduism.501.regional_murugan: "Murugan, God of War and Victory, and Commander of the Gods"
  dharma_hinduism.501.regional_varuna: "Varuna, Lord of the Sea and sky."
  dharma_hinduism.501.regional_khandoba: "Khandoba, The destroyer of Demons."
  dharma_hinduism.501.regional_devnarayan: "Devnarayan, Martial incarnation of Vishnu."
  # Other Gods
  dharma_hinduism.501.other_ganga: "Ganga, goddess of purity, atonement, and moksha."
  dharma_hinduism.501.other_kubera: "Kubera, the deformed god of wealth, justice, and material riches."
  dharma_hinduism.501.other_buddha: "Buddha, the avatar of Vishnu, regarded as the great sage and teacher."

#######################################
# Hindu Philosophy
#######################################
  dharma_hinduism.050.t: "Hindu Philosophy"
  dharma_hinduism.050.desc: "There are a number of schools of Hindu Philosophy known as Astika that one can study and patronize. Which if any school of philosophy shall you choose to support?"
  dharma_hinduism.050.yoga: "Yoga."
  dharma_hinduism.050.samkhya: "Samkhya."
  dharma_hinduism.050.vaisheshika: "Vaisheshika."
  dharma_hinduism.050.mimamsa: "Mimamsa."
  dharma_hinduism.050.nyaya: "Nyaya."
  dharma_hinduism.050.vedanta: "One of the schools of Vedanta."
  dharma_hinduism.050.optout: "Not at this moment."

  dharma_hinduism.051.t: "Hindu Philosophy"
  dharma_hinduism.051.desc: "There are a number of schools of Hindu Philosophy known as Astika that one can study and patronize. Which if any school of philosophy shall you choose to support?"
  dharma_hinduism.051.vishishtadvaita: "Vishishtadvaita."
  dharma_hinduism.051.advaita_vedanta: "Advaita Vedanta."
  dharma_hinduism.051.bhedabheda: "Bhedabheda."
  dharma_hinduism.051.dvaita_vedanta: "Dvaita Vedanta."
  dharma_hinduism.051.philosophy: "Another Branch of Philosophy."
  dharma_hinduism.051.optout: "Not at this moment.."

  dharma_hinduism.052.t: "Ramanuja creates the Vishishtadvaita school"
  dharma_hinduism.052.desc: "The great monk, Ramanuja, has been talking about his new school of Vedanta philosophy that he has created, called Vishishtadvaita. Vishishtadvaita is a form of non-dualistic school of Vedanta Philosophy branching off of Advaita Vedanta."
  dharma_hinduism.052.support: "An interesting Development"
  dharma_hinduism.052.patronize: "Patronize the School"
  dharma_hinduism.052.adopt: "Adopt the School"

  dharma_hinduism.053.t: "Madhvacharya creates the Dvaita Vedanta school"
  dharma_hinduism.053.desc: "The great monk, Madhvacharya, has been talking about his new school of Vedanta philosophy that he has created, called Dvaita Vedanta. Dvaita Vedanta in contrast to other Vedanta schools, is a dualistic school that believes that God and individual souls exist as independent realities."
  dharma_hinduism.053.support: "An interesting Development."
  dharma_hinduism.053.patronize: "Patronize the School."
  dharma_hinduism.053.adopt: "Adopt the School."

#######################################
# Visiting Sharada Peeth
#######################################
  dharma_hinduism.300.t: "Visit Sharada Peeth?"
  dharma_hinduism.300.desc: "You are deciding if you should visit the famous university of Sharada Peeth. Sharada Peeth attracts scholars from around India. Sharada Peeth has a number of libraries, scholars and theologians. Visiting the university is a decent way to try and improve your understanding of the world.\n\nShould you go to Sharada Peeth or should you stay in your court?"
  dharma_hinduism.300.stay: "I shall Stay"
  dharma_hinduism.300.go: "I shall Go"
  activity_dharma_visit_sharada_peeth: "Visiting Sharada Peeth"
  activity_dharma_visit_sharada_peeth_name: "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] Visiting Sharada Peeth."

  dharma_hinduism.301.t: "Arriving at Sharada Peeth"
  dharma_hinduism.301.desc: "You have arrived at the magnificent University of Sharada Peeth. It's a massive complex of red brick buildings, busy with a bustle of scholars and monks. You have been told that people come here from all over India and beyond in order to study and exchange ideas. The library has a huge amount of texts in every language known to man.\n\nIt's an impressive place."
  dharma_hinduism.301.arival: "This is Quite amazing"

  dharma_hinduism.302.t: "Visiting the Library"
  dharma_hinduism.302.desc: "While at the University you got the chance to visit the famous Library of Sharada Peeth. Its shelves had scrolls and books on many different subjects from around the world. Not just Buddhist texts, but Hindu and Jain text can also be found here as well. However, as vast as it is, you do not have an eternity, so you have to decide what books you want to read. "
  dharma_hinduism.302.buddhist: "Buddhist Texts"
  dharma_hinduism.302.hindu: "Hindu Texts"    
  dharma_hinduism.302.jain: "Jain Texts"
  dharma_hinduism.302.medical: "Medical Texts"
  dharma_hinduism.302.astrology: "Astrology Texts"

  dharma_hinduism.303.t: "Meditating with the Monks"
  dharma_hinduism.303.desc: "This morning at the University, you woke up with the Monks to meditate with them. After the Meditation session you found yourself more energized and relaxed. "
  dharma_hinduism.303.energy: "Now time to explore the University. "

  dharma_hinduism.304.t: "Vegetarian or non-vegetarian"
  dharma_hinduism.304.desc: "While walking through the University you came across some monks debating if Vegetarianism should be required or not. The monk advocating for Vegetarianism argues that it causes the least suffering, while the other monk counters that vegetarianism is not possible when doing the Alm Rounds for not all the people who would provide food are vegetarians. 'Are we just to starve, then?' he retorts. The monks then turn to you and ask you who had a better point. "
  dharma_hinduism.304.meat: "The Non-Vegetarian Monk"
  dharma_hinduism.304.vegetarian: "The Vegetarian Monk"

  dharma_hinduism.305.t: "Cosmopolitan Experience"
  dharma_hinduism.305.desc: "Staying in Sharada Peeth, I encounter numerous scholars. There are people not just from around India but from around the world. There are people from Tibet, southeast asia and even the Chinese Empire. Being around all these people has been quite the experience. "
  dharma_hinduism.305.people: "What an interesting experience"

