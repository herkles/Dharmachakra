  dharma_buddhism.306.vajrayana.success_title: "Successfully impressed the scholars"
  dharma_buddhism.306.vajrayana.failure: "You fail to impress the scholars by supporting the vajrayana position."
  dharma_buddhism.306.vajrayana.failure_title: "Failed to impress the scholars"
  dharma_buddhism.306.pudgalavada: "Support the Pudgalavada Position"
