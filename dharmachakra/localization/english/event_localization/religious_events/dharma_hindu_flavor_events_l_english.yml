  dharma_buddhism.314.desc: "Walking through the halls of Nalanda, you come across a debate between various monks. These scholars are debating finer points of Buddhist Philosophy. Should you join in the debate and try to impress the scholars with your knowledge or just stay out of the debate?"
  dharma_buddhism.314.chan: "Support the Chan Position"
