  dharma_buddhism.306.tibetan: "Support the Nang Chos Position"
  dharma_buddhism.306.tibetan.success: "You successfully impress the scholars by supporting the Nang Chos position."
  dharma_buddhism.306.tibetan.success_title: "Successfully impressed the scholars"
