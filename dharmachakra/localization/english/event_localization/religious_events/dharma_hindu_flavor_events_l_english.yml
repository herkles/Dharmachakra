l_english:

#######################################
# WANDERING MONKS
#######################################
  dharma_buddhism.001.t: "Wandering Buddhist Monk Arrives at your Court"
  dharma_buddhism.001.desc: "A Buddhist monk has appeared at your court, seeking an audience. He speaks to you of the ways of the Buddha and of how to reach wisdom by rejecting excess and moderating your desires."
  dharma_buddhism.001.stay: "Let him Stay"

  dharma_buddhism.002.t: "Buddhist Monk's Dharma Talk"
  dharma_buddhism.002.desc: "The Monk gives a dharma talk elaborating on the way of asceticism and yoga and how to live a spiritual life through discipline and mediation."
  dharma_buddhism.002.meditate: "I shall meditate on this further."

  dharma_buddhism.003.t: "Buddhist monk asks for donations"
  dharma_buddhism.003.desc: "While the Monk is staying at your court, you are to provide him with food and donations to get by. He does not ask for as much as he has but one meal a day, still as a ruler it is expected of you to tend to your guests."
  dharma_buddhism.003.donate: "Here you go. "

  dharma_buddhism.004.t: "Meditate with Monk?"
  dharma_buddhism.004.desc: "The Monk has mentioned that you should spend some time out in the courtyard meditating together. However should you focus on this or should you focus on your worldly duties as a ruler? "
  dharma_buddhism.004.busy: "I am busy"
  dharma_buddhism.004.mani: "Om Mani Padme Hum"    

  dharma_buddhism.005.t: "Child wishes to become a monk"
  dharma_buddhism.005.desc: "Your [child_wants_monk.Custom('GetDaughterSon')] is well known for [child_wants_monk.GetHerHis] piety and zeal. Today [child_wants_monk.GetSheHe] has come to you to ask for your blessings to become a monk. Doing so would mean that [child_wants_monk.GetSheHe] is no longer able to marry and will not be in the line of succession."
  dharma_buddhism.005.blessings: "You have my Blessings"
  dharma_buddhism.005.no: "Absolutely Not"

  dharma_buddhism.007.t: "Zealous non-heir child wishes to join the Sangha"
  dharma_buddhism.007.desc: "you [child.Custom('GetDaughterSon')] has been spending a lot of time with the Buddhist Monk in your court. You have always known [child.GetHerHim] to be pious and devoted to the teaching of the Buddha. Now however [child.GetSheHe] has expressed their desire to join the Sangha. Doing so would mean that [child.GetSheHe] would give up their worldly possessions, including any right of succession and be forbidden from marrying or siring any children."
  dharma_buddhism.007.no: "Absolutely Not!"
  dharma_buddhism.007.yes: "You have my blessings"    

  dharma_buddhism.008.t: "Monastic Ordination"
  dharma_buddhism.008.desc: "The day has come when [root.getChildFirstName] will be ordained as a monk. [child.GetSheHe] chanted the mantras and recited the ten precepts. You watched as [child.GetSheHe]  was shaved bald, [get.child.HIsHER] hair falling to the ground. Later after more chanting and bowing to the senior monks, [child.GetHerHim]  received the robes of a monk"
  dharma_buddhism.008.monk: "This is a blessed Day"

#######################################
# MERIT-MAKING
#######################################
  dharma_buddhism.019.t: "Donating to the local Monks"
  dharma_buddhism.019.desc: "Monks from a local monastery have approached you, asking for donations. They need to accommodate the worshipers and still have enough provisions to maintain their other work and studies."
  dharma_buddhism.019.food: "I shall donate Food"
  dharma_buddhism.019.gold: "I shall donate supplies"    
  dharma_buddhism.019.optout: "Not my concern"    

  dharma_buddhism.020.t: "Life Release"
  dharma_buddhism.020.desc: "One of the ways to make merit is to do a life-release where you will release animals back into the wilderness so that they aren't killed by humans. Shall you release some animals today?"
  dharma_buddhism.020.release: "Let the animal go free"
  dharma_buddhism.020.food: "On the other hand, what about my dinner?"    

  dharma_buddhism.021.t: "Donating to the Poor"
  dharma_buddhism.021.desc: "ONe of the ways to make Merit is to donate and provide for the poor of your realm. Doing so will show you what a generous and benevolent ruler that you are, as well as help you on your path towards enlightenment."
  dharma_buddhism.021.large: "A large donation to the people!"
  dharma_buddhism.021.average: "An average donation"    

  dharma_buddhism.022.t: "Patronizing a Monastery"
  dharma_buddhism.022.desc: "One of the common ways for a ruler to make merit and to show their wealth and power is to patronize the monasteries of [root.getHisHer] Realm. How shall you patronize the Monasteries of your realm? Build a new on or perhaps donate books and supplies"
  dharma_buddhism.022.build: "I shall support the construction of a new monastery"
  dharma_buddhism.022.nobuild: "I can't afford it at this time"

  dharma_buddhism.023.t: "First Harvest Offerings"
  dharma_buddhism.023.desc: "It is the first harvest of the season, and a traditional way to make Merit is to offer up the first harvest to the Monks. Of course you could also donate it to the people under you as well."
  dharma_buddhism.023.monks: "The Monks get the first offering"
  dharma_buddhism.023.people: "The People get the first offering"    

#######################################
# Buddhist Schools
#######################################
  dharma_buddhism.050.t: "Following a Buddhist School"
  dharma_buddhism.050.desc: "There are a number of schools of Buddhism that the great monks have developed over the years. While I may not be a monk, by following one it will help me reach enlightenment. The question is which school shall I choose?"
  dharma_buddhism.050.chan: "The teachings of the Chan School."
  dharma_buddhism.050.madhyamaka: "The teachings of the Madhyamaka School."
  dharma_buddhism.050.yogachara: "The teachings of the Yogachara School."
  dharma_buddhism.050.pure_land: "The teachings of the Pure Land School."
  dharma_buddhism.050.optout: "I am not yet ready to decide."

  dharma_buddhism.051.t: "Following a Buddhist School"
  dharma_buddhism.051.desc: "There are a number of schools of Buddhism that the great monks have developed over the years. While I may not be a monk, by following one it will help me reach enlightenment. The question is which school shall I choose?"
  dharma_buddhism.051.nyingma: "The teachings of the Nyingma School."
  dharma_buddhism.051.kadam: "The teachings of the Kadam School."
  dharma_buddhism.051.sakya: "The teachings of the Sakya School."
  dharma_buddhism.051.kagyu: "The teachings of the Kagyu School."
  dharma_buddhism.051.optout: "I am not yet ready to decide."

  dharma_buddhism.052.t: "Your [councillor_court_chaplain.GetTitle] favors a different Buddhist School."
  dharma_buddhism.052.desc: "Your [councillor_court_chaplain.GetTitle] is a monk who follows a different Buddhist school than the one that you follow. [councillor_court_chaplain.getHeShe] has come to you and asked you to start to follow [councillor_court_chaplain.getHisHer] school's teachings instead."
  dharma_buddhism.052.switch: "I shall do so."
  dharma_buddhism.052.stick: "I like the teachings of the current school."
  dharma_buddhism.052.convince: "I will try to convince [councillor_court_chaplain.getHimHer]"
  dharma_buddhism.052.convince.success: "You successfully convinced your Court Chaplain."
  dharma_buddhism.052.convince.failure: "You Fail to convince your Court Chaplain."

  dharma_buddhism.053.t: "Your [councillor_court_chaplain.GetTitle] encourages you to follow the teachings of [councillor_court_chaplain.getHisHer] school"
  dharma_buddhism.053.desc: "You currently have not incorporated any Buddhist school's teachings into your daily life nor are you patronizing any particular school. Your [councillor_court_chaplain.GetTitle]has come to say that you should be supporting [councillor_court_chaplain.getHisHer] School."
  dharma_buddhism.053.follow: "I shall support [councillor_court_chaplain.getHisHer] school."
  dharma_buddhism.053.not_follow: "I shall Not!"

  # Founding of Buddhist Schools

  dharma_buddhism.054.t: "The Mahasiddha Naropa"
  dharma_buddhism.054.desc: "A Monastic in Vikramashila has become something of a celebration, known as Mahasiddha Naropa; he has begun to attract a number of students to the Vihar near and far."
  dharma_buddhism.054.naropa: "Quite the Interesting Monk."

  dharma_buddhism.055.t: "The monk Atisa Arrives"
  dharma_buddhism.055.desc: "The Bengali Monk, Atisa, has recently arrived in your kingdom and has begun to work at one of the local monasteries. He is quite the skilled monk, and claims to have visited far off Sumatra"

#######################################
# Hindu Monks and Ascetics
#######################################
  dharma_hinduism.001.t: "Hindu ascetic comes to visit"
  dharma_hinduism.001.desc: "A Hindu yogi has appeared at your court, seeking an audience. He speaks of the many Hindu gods and how to reach for wisdom and power by honoring them and following the wisdom of the Puranas and Vedas."
  dharma_hinduism.001.stay: "Tell me more..."

  dharma_hinduism.002.t: "Tell me more, Hindu ascetic"
  dharma_hinduism.002.desc: "The yogi continues to elaborate on the way of asceticism and yoga and how to live a spiritual life through discipline and meditation."
  dharma_hinduism.002.meditate: "Thank you for your wisdom"

  dharma_hinduism.003.t: "Yoga with the Yogi"
  dharma_hinduism.003.desc: "The Yogi offers to practice Yoga with you before he departs from your court. Shall you take him up on the offer? "
  dharma_hinduism.003.busy: "Sadly I am Busy"
  dharma_hinduism.003.yoga: "I shall Join you"

  dharma_hinduism.004.t: "Tell me more, Hindu ascetic"
  dharma_hinduism.004.desc: "The Yogi offers to meditate with you before he departs from your court. Shall you take him up on the offer?"
  dharma_hinduism.004.busy: "Sadly I am Busy"
  dharma_hinduism.004.meditate: "I shall Join you"

  dharma_hinduism.005.t: "Child wishes to become a monk"
  dharma_hinduism.005.desc: "Your [child_wants_monk.Custom('GetDaughterSon')] is well known for [child_wants_monk.GetHerHis] piety and zeal. Today [child_wants_monk.GetSheHe] has come to you to ask for your blessings to become a monk. Doing so would mean that [child_wants_monk.GetSheHe] is no longer able to marry and will not be in the line of succession."
  dharma_hinduism.005.blessings: "You have my Blessings"
  dharma_hinduism.005.no: "Absolutely Not"

  #######################################
  # Hindu Temples
  #######################################
  dharma_hinduism.006.t: "Hindu Priests ask for Donations"
  dharma_hinduism.006.desc: "Priests from a local Hindu temple have approached you, asking for donations. They need to expand the temple with a new building in order to accommodate the growing number of worshipers."
  dharma_hinduism.006.donate: "Here you go"
  dharma_hinduism.006.nodonate: "Sadly I can't spare the change right now"

  dharma_hinduism.007.t: "Local Hindu Temple wants a new Murti statue"
  dharma_hinduism.007.desc: "A local Temple wants to dedicate a new murti statue of [ROOT.Char.GetFaith.random_GoodGodNames] to put in the temple. Will you support the temple and patronize the creation of a new statue?"
  dharma_hinduism.007.patronize: "Here you go."
  dharma_hinduism.007.no_patronize: "Sadly I don't have the money now"

  dharma_hinduism.008.t: "Receiving Prasada"
  dharma_hinduism.008.desc: "While at the temple today, you received Prasada, holy fruit that was first gifted to the Divine. You felt rather good and energized after leaving the temple today.. "
  dharma_hinduism.008.prasada: "OM "

  dharma_hinduism.009.t: "Chanting mantras"
  dharma_hinduism.009.desc: "Today while you were at the temple you meditated and chanted mantras to [ROOT.Char.GetFaith.random_GoodGodNames]. After leaving the temple you felt better then normal"
  dharma_hinduism.009.donate: "Om"

  dharma_hinduism.010.t: "Studying the Vedas at the Temple"
  dharma_hinduism.010.desc: "During your visit to the local temple, you spent some time studying the vedas. While the ancient holy texts are complicated, you feel that you learned something, you think. "
  dharma_hinduism.010.vedas: "Om."

  dharma_hinduism.011.t: "A Hindu Religious Site"
  dharma_hinduism.011.desc: "For those of status such as myself, one way for us to show our devotion to [faith.HighGodName] as good [faith.GetAdherentNamePlural] is to found [hindu.GetAdjective] religious sites. In doing so, we not only improve the spiritual lives of the locals, but also are a good way to demonstrate our piety.\n\nI have thus ordered for the construction of a"
  dharma_hinduism.011.desc.shrine: "#Bold [faith.GetAdjectiveNoTooltip] shrine#!. Though small places of worship that often lack any resident [faith.PriestNeuterPlural], shrines still have their role. In isolated areas, a shrine can serve as a place for religious attendance for those who cannot reach larger temples more easily. Other shrines serve as adjuncts to existing religious complexes."
  dharma_hinduism.011.desc.small_temple: "#Bold small [faith.GetAdjectiveNoTooltip] temple#!. Temples like these serve the spiritual needs of smaller settlements, or, in some cases, countryside areas where people live far apart. They may be humble structures, but they are essential for ensuring that the spiritual needs of these [faith.GetAdherentNamePluralNoTooltip] can be fulfilled."
  dharma_hinduism.011.desc.small_monastery: "#Bold small [faith.GetAdjectiveNoTooltip] monastery#!. Here, monks and nuns can focus on spiritual matters, and study theology and the [faith.ReligiousText] in a peaceful environment. They can also provide a limited amount of services to the local community, thanks to the monks and nuns’ knowledge and wisdom."
  dharma_hinduism.011.desc.large_temple: "#Bold large [faith.GetAdjectiveNoTooltip] temple#!. While this is no towering mandir, of course, it will still serve as an impressive sight in the settlement it will be built in. Its presence will inspire the locals to greater deeds, and provide them a place to pray and worship the glory of [faith.HighGodName]."
  dharma_hinduism.011.desc.large_monastery: "#Bold large [faith.GetAdjectiveNoTooltip] monastery#!. Here, monks and nuns can focus on spiritual matters, and study theology and the [faith.ReligiousText] in a peaceful environment. This sizable structure may also host a number of services for the local community, such as through hospitals, schools, and various economical buildings."
  dharma_hinduism.011.desc.conclusion: "\n\nAll in all, this building will take some time to finish, but I’m sure the wait will be worth it."
  dharma_hinduism.011.a: "I look forward to its completion."
  dharma_hinduism.011.disclaimer: "#bold When construction of this sacred site is complete in approximately one to two years, you will receive the boons listed below.#!"

  dharma_hinduism.012.t: "Hindu Religious Site Completed"
  dharma_hinduism.012.desc.shrine: "Praise [faith.HighGodName]!\n\nI have just received word that the [faith.GetAdjective] shrine I ordered to be built has been completed in [county.GetNameNoTier]. Though it is a simple structure, there is no doubt that local [faith.GetAdherentNamePluralNoTooltip] will make much use of it to pray and worship."
  dharma_hinduism.012.desc.small_temple: "Praise [faith.HighGodName]!\n\nI have just received word that the small [faith.GetAdjective] temple I ordered to be built has been completed in [county.GetNameNoTier]. There is no doubt that it will play an important role in the local settlement’s religious life for many years to come."
  dharma_hinduism.012.desc.small_monastery: "Praise [faith.HighGodName]!\n\nI have just received word that the small [faith.GetAdjective] monastery I ordered to be built has been completed in [county.GetNameNoTier]. It may be humble in size compared to the other great monastery complexes, but it will provide for the local community in more ways than one."
  dharma_hinduism.012.desc.large_temple: "Praise [faith.HighGodName]!\n\nI have just received word that the large [faith.GetAdjective] temple I ordered to be built has been completed in [county.GetNameNoTier]. While it cannot match the great mandirs, it is still a majestic sight, and will inspire and provide for the spiritual needs of many [faith.GetAdherentNamePluralNoTooltip] for many generations."
  dharma_hinduism.012.desc.large_monastery: "Praise [faith.HighGodName]!\n\nI have just received word that the large [faith.GetAdjective] monastery I ordered to be built has been completed in [county.GetNameNoTier]. With its great size and decent sized monastic community, it will provide many important services to nearby settlements, and serve as a local center of learning and faith."
  dharma_hinduism.012.a: "I am glad to have founded such a religious site."

  dharma_hinduism.013.t: "$dharma_hinduism.011.t$"
  dharma_hinduism.013.desc: "Before my conversion to [ROOT.Char.GetFaith.GetName], I had donated a significant sum of funds towards the construction of a new [faith.GetAdjective] religious site in [county.GetNameNoTier]. That building, which will soon finish building, no longer has any spiritual relevance to me.\n\nThat said, I could still encourage its usage as a gesture of goodwill towards the [hindu.GetAdjective] community I used to be part of. On the other hand, perhaps I should demonstrate the sincerity of my new belief in [ROOT.Char.GetFaith.HighGodName], and disavow that structure, to leave it to its fate or reuse it as some other facility."
  dharma_hinduism.013.a: "Allow worshipers to use it for their religious needs."
  dharma_hinduism.013.a.tooltip: "Because you converted to a non-dharmic [faith|E], you have forfeited the right to the [character_modifier|E] you were originally going to receive."
  dharma_hinduism.013.b: "Disavow that building - I am a true [ROOT.Char.GetFaith.GetAdherentName]!"
  dharma_hinduism.013.b.tooltip: "To prove that your conversion to [THIS.Char.GetFaith.GetName] is genuine, you not only forfeit the right to the [character_modifier|E] you were originally going to receive, but the [county_modifier|E] in your [realm_capital|E] as well"

#######################################
# Hindu Bhakti
#######################################

  dharma_hinduism.500.t: "Bhakti"
  dharma_hinduism.500.desc.start: "Bhakti can be likened to feelings of fondness, devotion, and worship, but none of these fully encompass the concept. By devoting myself to an avatar of divinity, I am committing myself to them in body and soul.\n\n[ROOT.Char.GetFaith.GetNameNoTooltip] focuses on the veneration of"
  dharma_hinduism.500.desc.generic: "just several of them."
  dharma_hinduism.500.desc.vaishnavism: "the various incarnations of Vishnu the Preserver."
  dharma_hinduism.500.desc.shaivism: "the many incarnations of Shiva the Destroyer."
  dharma_hinduism.500.desc.smartism: "the aspects of the ultimate reality."
  dharma_hinduism.500.desc.end: "Of these aspects, one must speak to me more than the others..."

