l_english:

 dharma_misc.0010.t: "Conversion"
 dharma_misc.0010.desc.host: "Because I have converted to [host.GetFaith.GetName], the [activity_type.GetNameNoTooltip()] I originally planned is of little use to me anymore, as the event itself or the manner it would have been done in does not adhere to the new teachings I follow. I have therefore canceled this event."
 dharma_misc.0010.desc.not_host: "Because [host.GetTitledFirstName] have converted to [host.GetFaith.GetName], the [activity_type.GetNameNoTooltip()] [host.GetSheHe] originally planned has been canceled, as the event itself or the manner it would have been done in does not adhere to the new teachings [host.GetSheHe] follows.\n\nThis is awkward to say the least."
 dharma_misc.0010.a: "And so it is."

