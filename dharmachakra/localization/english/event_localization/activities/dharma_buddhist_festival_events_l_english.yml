l_english:

  dharma_buddhist_festivals.001.t: "Vesak begins"
  dharma_buddhist_festivals.001.desc: "Vesak is now here and the festival atmosphere can be felt throughout the palace and into the streets. People are visiting local shrines and temples. Vesak is now here. "
  dharma_buddhist_festivals.001.vesak: "Let us honor the Buddha"

  dharma_buddhist_festivals.002.t: "The Buddhist Precipits"
  dharma_buddhist_festivals.002.desc: "During Vesak it is common for Buddhists to take the eight Precepts. They are similar to the five precepts that laity like myself follow, however during Vessak I am to avoid all sexual conduct, luxury, and to eat at the same time as a monk.  "
  dharma_buddhist_festivals.002.eight: "Eight Precepts"
  dharma_buddhist_festivals.002.five: "I shall stick with the 5 precepts"

  dharma_buddhist_festivals.003.t: "Visiting the monastaries"
  dharma_buddhist_festivals.003.desc: "As part of Vesak one of the important things to do is to visit the local monasteries and meditate upon the Buddha's life and the idea that nothing is permanent."
  dharma_buddhist_festivals.003.temple: "Om Mani Padme Hum"

  dharma_buddhist_festivals.004.t: "Dharma Talk from the monks"
  dharma_buddhist_festivals.004.desc: "After bathing and anointing the statues of the Buddha. The local monks give a dharma talk about peace and happiness for you and your dynasty as well as the common folk. "
  dharma_buddhist_festivals.004.talk: "Peace and Prosperity"

  dharma_buddhist_festivals.005.t: "Family Feast"
  dharma_buddhist_festivals.005.desc: "Today is Vesak and you are preparing for your feast with your family and court on this holy occasion. On Vesak, the feast is to be a vegetarian meal. This is regarded as particular meritorious on this holy day."
  dharma_buddhist_festivals.005.feast: "A wonderful feast."

  dharma_buddhist_festivals.006.t: "Animal Release"
  dharma_buddhist_festivals.006.desc: "As part of Vesak, it is common for people to engage in life release for animals. Where animals that are in captivity or were going to be eaten are to be released into the wilds to live out the rest of their lives. Fish are let back into rivers and streams, Birds are let loose to fly, animals are let back into the hills and plains. This act is regarded as specially meritorious. "
  dharma_buddhist_festivals.006.animal: "May all living things prosper."

  dharma_buddhist_festivals.007.t: "Prisoner release"
  dharma_buddhist_festivals.007.desc: "You have several prisoners in your prison. As today is Vesak, a day of charity. a monk suggests releasing some of them. Of course they are in prison for a reason. What shall happen to them?"
  dharma_buddhist_festivals.007.release: "They will be released"
  dharma_buddhist_festivals.007.prison: "They shall stay locked up"

  dharma_buddhist_festivals.008.t: "Charity for the commoners"
  dharma_buddhist_festivals.008.desc: "As part of Vesak, it is common to offer charity to those that need it most. As a ruler, it is customary to offer charity to your common people on this special time. The question is what sort of charity shall you do for them."
  dharma_buddhist_festivals.008.large: "A grand Gift for the commoners"
  dharma_buddhist_festivals.008.medium: "A normal gift for the commoners"
  dharma_buddhist_festivals.008.small: "A small gift for the commoners"

  dharma_buddhist_festivals.009.t: "Light Procession"
  dharma_buddhist_festivals.009.desc: "At the end of Vesak, everyone gathers near the monastery, both commoner and noble alike. The monks lead in chanting for the public while people hold tea lights and lanterns. As the sun descends and night arrives, it is these lights that light up the sky. After a while the lanterns are released and they are floating away, illuminating the night sky as they help to burn away bad karma."
  dharma_buddhist_festivals.009.light: "What wonderful lights."

  dharma_buddhist_festivals.010.t: "Vesak Concludes"
  dharma_buddhist_festivals.010.desc: "The festivities of Vesak are now finally over, and the happy mood of the festival continues on for many days. Yet still every good thing must come to an end."
  dharma_buddhist_festivals.010.home: "Till next time."





