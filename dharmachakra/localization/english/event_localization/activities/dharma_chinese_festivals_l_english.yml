l_english:

# Chinese New Year 
  dharma_chinese_festivals.001.t: "The Spring Festival is here!"
  dharma_chinese_festivals.001.desc: "The New Year has arrived and with it so has the Spring Festival. People are already lining the streets with kites and people putting up paper mache of fishes and dragons. Shops are selling trinkets for the festival. The New Year has arrived. "
  dharma_chinese_festivals.001.a: "This is quite the sight."

  dharma_chinese_festivals.002.t: "Honoring my Ancestors"
  dharma_chinese_festivals.002.desc: "The family shrine has been swept clean and the local deities that we revere have been given their offerings. We have placed bowls of rice and other food at the shrine to honor ancestors. Incense has been lit."
  dharma_chinese_festivals.002.a: "I shall make sure the shrine is cared for personally"

  dharma_chinese_festivals.003.t: "Going to the Temple"
  dharma_chinese_festivals.003.desc: "After honoring our ancestors we are going to the temple to honor the Gods. In particular the temple that is dedicated to Caishen, the lord of wealth. You and your household follow the priests to the temple to pay respect to the lord and hope to receive his blessings for the new year."
  dharma_chinese_festivals.003.a: "Cai Shen dao!"

  dharma_chinese_festivals.004.t: "Parades through the city"
  dharma_chinese_festivals.004.desc: "The city is filled with parades and music as people parade through the city. People both rich and poor came out to watch the celebrations as musicians and people in colorful lion and dragon costumes. It is a wonderful day as you watch from the balcony as the people parade through the city."
  dharma_chinese_festivals.004.a: "What a Joyous day"

  dharma_chinese_festivals.005.t: "Family Feast"
  dharma_chinese_festivals.005.desc: "After the procession of the idols through the city. In contrast to many other festivals, the idols are made from wood and straw and following the procession they along with the chariots are burned and used for fuel to help the temples cook food for your court and the people. /n/nThus later on in the evening, you are in your courtyard with your courtiers and family as your servants bring you food to enjoy together."
  dharma_chinese_festivals.005.a: "Good food with family and friends"

  dharma_chinese_festivals.006.t: "Gifts for your relatives"
  dharma_chinese_festivals.006.desc: "During Navaratri it is common to buy gifts for relatives and loved ones. Of your many relatives whom shall you get a gift for? "
  dharma_chinese_festivals.006.everyone: "All my relatives"
  dharma_chinese_festivals.006.elders: "My Parents"
  dharma_chinese_festivals.006.spouses: "My spouse"
  dharma_chinese_festivals.006.siblings: "My Siblings"
  dharma_chinese_festivals.006.children: "My Children"

  dharma_chinese_festivals.007.t: "Procession of Lights"
  dharma_chinese_festivals.007.desc: "The last day of the New Years celebration is here and the city is adorned with kites and lanterns as the Lantern Festival part of the new year celebration is now ongoing. The city is filled with lights from paper lanterns and shows as people are enjoying the last day of the new year."
  dharma_chinese_festivals.007.a: "Good food with family and friends"

  dharma_chinese_festivals.008.t: "New Year Festivities concludes"
  dharma_chinese_festivals.008.desc: "The festivities of the New Years are now finally over, and the happy mood of the festival continues on for many days. Yet still every good thing must come to an end"
  dharma_chinese_festivals.008.a: "Till next time!"

# Qingming 
  dharma_chinese_festivals.020.t: "Qingming is here!"
  dharma_chinese_festivals.020.desc: "The spring equinox has arrived and that means it is time to celebrate the festival of Qingming. This is a time to honor the family, both those that have passed on and those still living with us."
  dharma_chinese_festivals.020.a: "May our ancestors rest in peace"

  dharma_chinese_festivals.021.t: "Having the Graves Swept"
  dharma_chinese_festivals.021.desc: "Qingming is the festival of tomb sweeping and so it is only right that we sweep our family's tomb and ensure that they are well taken care of. You have plenty of servants that could do this for you, or shall you decide to do the sweeping yourself?"
  dharma_chinese_festivals.021.a: "I shall make sure the shrine is cared for personally"
  dharma_chinese_festivals.021.b: "That is what servants are for."

  dharma_chinese_festivals.022.t: "Visiting the Tombs"
  dharma_chinese_festivals.022.desc.not_mourning: "My family went to visit our family tombs. There we burnt incense for them, provided food that they would enjoy, and burnt paper mache with the designs of money on them so they can have nice things in the afterlife. "
  dharma_chinese_festivals.022.desc.mourning: "My family went to visit our family tombs. There we burnt incense for them, provided food that they would enjoy, and burnt paper mache with the designs of money on them for our family. During that time I could not help it and let tears fall down my face as I grieved my family who has passed away. "
  dharma_chinese_festivals.022.a: "Csdfa!"

  dharma_chinese_festivals.023.t: "Spring Outing"
  dharma_chinese_festivals.023.desc: "After visiting the family tombs, we have the opportunity to enjoy time in the parks and gardens of the estate. Sometimes it is the time to fly kites, others to walk and enjoy the outdoors, but it is a good time to celebrate with the family."
  dharma_chinese_festivals.023.a: "What a Joyous day"

  dharma_chinese_festivals.024.t: "Family Feast"
  dharma_chinese_festivals.024.desc: "After spending time honoring your ancestors, and enjoying the outdoors, it now culminates with a feast for you and your family. Your servants have brought a number of  delicies for you and your family to enjoy on this auspicious day. "
  dharma_chinese_festivals.024.a: "Food unites the family"

  dharma_chinese_festivals.025.t: "Qingming concludes"
  dharma_chinese_festivals.025.desc: "The festivities of Qingming are now finally over, and the happy mood of the festival continues on for many days. Yet still every good thing must come to an end"
  dharma_chinese_festivals.025.a: "Till next time!"

