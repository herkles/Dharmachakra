l_english:

  dharma_vedic_sacrifice.001.t: "Preparing the Sacrifice"
  dharma_vedic_sacrifice.001.desc: "According to the sacred Vedas, animal sacrifices are a way of getting closer to the divine. Therefore, to sacrifice a goat to the heavens is a great offering I can perform as a [ROOT.Char.GetTitleAsNameNoTooltip]."
  dharma_vedic_sacrifice.001.a: "Let's get ready for the sacrifice."
  dharma_vedic_sacrifice.001.tooltip: "The type of animals you sacrifice will determine how well your sacrifice is perceived by the community and, perhaps, how the deities will respond."

  dharma_vedic_sacrifice.002.t: "Sacrifice the Animals!"
  dharma_vedic_sacrifice.002.desc: "With that in mind, I now need to choose which deity to sacrifice to. We shall bring the animals to a local temple where a cleansing ritual shall purify the animal before they are offered to the aspect of the Divine."
  dharma_vedic_sacrifice.002.a: "May [ROOT.Char.GetFaith.HighGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.b: "May [ROOT.Char.GetFaith.NightGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.c: "May [ROOT.Char.GetFaith.WealthGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.d: "May [ROOT.Char.GetFaith.HouseholdGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.e: "May [ROOT.Char.GetFaith.KnowledgeGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.f: "May [ROOT.Char.GetFaith.FertilityGodName] accept my sacrifice!"
  dharma_vedic_sacrifice.002.nothing: "Your sacrifice does not appear adequate!"
  dharma_vedic_sacrifice.002.nothing.tooltip: "Alas, receive no boons for your sacrifice."
  dharma_vedic_sacrifice.002.something: "Your pious sacrifice is duly noted!"

